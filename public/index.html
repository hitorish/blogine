<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blogine — 블로그를 숏폼 영상으로</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <header class="hero">
    <h1>Blogine</h1>
    <p class="tagline">블로그 글 → 9:16 숏폼 영상 · 9씬 · 약 2분 분량</p>
  </header>

  <section id="form" class="card">
    <div class="step">
      <div class="step-label"><span class="num">1</span> 이미지</div>
      <div id="dropzone" class="dropzone">
        <p class="drop-hint">이미지를 끌어다 놓거나 <span class="link">직접 선택</span></p>
        <input type="file" id="fileInput" multiple accept="image/*" hidden>
        <ul id="fileList"></ul>
      </div>
    </div>

    <div class="step">
      <label class="step-label" for="contentText"><span class="num">2</span> 블로그 내용 <span class="optional">(선택)</span></label>
      <textarea id="contentText" rows="10" placeholder="블로그 글을 붙여넣으세요. 비워두면 이미지만으로 영상을 만듭니다."></textarea>
    </div>

    <button id="generateBtn" class="primary">영상 만들기</button>
    <button id="sampleBtn" class="ghost" type="button">샘플로 한 번 보기</button>
  </section>

  <section id="loading" class="card hidden">
    <ul class="stages" id="stages">
      <li class="stage" data-stage="0">
        <span class="dot"></span>
        <span class="stage-text">
          <span class="stage-title">입력 읽기</span>
          <span class="stage-sub"></span>
        </span>
      </li>
      <li class="stage" data-stage="1">
        <span class="dot"></span>
        <span class="stage-text">
          <span class="stage-title">씬 구조 잡기</span>
          <span class="stage-sub"></span>
        </span>
      </li>
      <li class="stage" data-stage="2">
        <span class="dot"></span>
        <span class="stage-text">
          <span class="stage-title">레이아웃 만들기</span>
          <span class="stage-sub"></span>
        </span>
      </li>
      <li class="stage" data-stage="3">
        <span class="dot"></span>
        <span class="stage-text">
          <span class="stage-title">스타일·타이포 다듬기</span>
          <span class="stage-sub"></span>
        </span>
      </li>
      <li class="stage" data-stage="4">
        <span class="dot"></span>
        <span class="stage-text">
          <span class="stage-title">애니메이션 합성</span>
          <span class="stage-sub"></span>
        </span>
      </li>
      <li class="stage" data-stage="5">
        <span class="dot"></span>
        <span class="stage-text">
          <span class="stage-title">마무리 점검</span>
          <span class="stage-sub"></span>
        </span>
      </li>
    </ul>
    <p class="hint loading-hint">꼼꼼하게 만들고 있어요. 보통 3~10분 걸립니다.</p>
    <p id="elapsed" class="elapsed"></p>
  </section>

  <section id="result" class="card hidden">
    <div class="phone">
      <iframe id="resultFrame" allow="autoplay"></iframe>
    </div>
    <div class="result-actions">
      <a id="fullscreenBtn" class="primary as-button" target="_blank" rel="noopener">큰 화면으로 보기 &nearr;</a>
      <button id="restartBtn" class="secondary">다시 만들기</button>
    </div>
  </section>

  <section id="errorBox" class="card hidden error">
    <p class="status">문제가 생겼어요.</p>
    <p id="errorText" class="hint"></p>
    <button id="retryBtn" class="secondary">다시 시도</button>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
